{
  "name": "ios-to-harmony",
  "description": "Convert an iOS Swift/SwiftUI project into a HarmonyOS NEXT project through staged skill execution.",
  "workdir": "{{WORKDIR}}",
  "ios_project": "{{IOS_PROJECT}}",
  "harmony_project": "{{PROJECT_NAME}}Harmony",
  "state_file": "output_{{PROJECT_NAME}}/workflow/迁移状态.md",
  "stages": [
    {
      "id": "ios-analyze",
      "name": "iOS工程分析",
      "profile": "ios-analyze",
      "required_inputs": ["{{IOS_PROJECT}}"],
      "expected_outputs": [
        "output_{{PROJECT_NAME}}/ios-analyze/ios-spec.json",
        "output_{{PROJECT_NAME}}/ios-analyze/reports/ios工程分析报告.md"
      ]
    },
    {
      "id": "platform-adaptation",
      "name": "平台能力适配",
      "profile": "platform-adaptation",
      "required_inputs": [
        "output_{{PROJECT_NAME}}/ios-analyze/ios-spec.json",
        "output_{{PROJECT_NAME}}/ios-analyze/reports/ios工程分析报告.md",
        "skills/platform-adaptation/references/platform-capabilities.json",
        "skills/platform-adaptation/references/system-capabilities.json",
        "skills/platform-adaptation/references/ui-interactions.json",
        "skills/platform-adaptation/references/concurrency-patterns.json",
        "skills/platform-adaptation/references/data-storage.json",
        "skills/platform-adaptation/references/media-capabilities.json"
      ],
      "expected_outputs": [
        "output_{{PROJECT_NAME}}/platform-adaptation/platform-adaptation.json"
      ]
    },
    {
      "id": "harmony-generate",
      "name": "Harmony工程生成",
      "profile": "harmony-generate",
      "required_inputs": [
        "output_{{PROJECT_NAME}}/ios-analyze/ios-spec.json",
        "output_{{PROJECT_NAME}}/ios-analyze/reports/ios工程分析报告.md",
        "output_{{PROJECT_NAME}}/platform-adaptation/platform-adaptation.json",
        "skills/harmony-generate/references/project-template"
      ],
      "expected_outputs": [
        "{{PROJECT_NAME}}Harmony",
        "output_{{PROJECT_NAME}}/harmony-generate/harmony-implementation.json"
      ]
    },
    {
      "id": "harmony-verify",
      "name": "Harmony迁移验收",
      "profile": "harmony-verify",
      "required_inputs": [
        "{{PROJECT_NAME}}Harmony",
        "output_{{PROJECT_NAME}}/ios-analyze/ios-spec.json",
        "output_{{PROJECT_NAME}}/ios-analyze/reports/ios工程分析报告.md",
        "output_{{PROJECT_NAME}}/platform-adaptation/platform-adaptation.json",
        "output_{{PROJECT_NAME}}/harmony-generate/harmony-implementation.json"
      ],
      "expected_outputs": [
        "output_{{PROJECT_NAME}}/harmony-verify/verification.json"
      ]
    }
  ]
}
