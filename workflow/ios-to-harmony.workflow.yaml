{
  "name": "ios-to-harmony",
  "description": "Convert an iOS Swift/SwiftUI project into a HarmonyOS NEXT project through staged skill execution.",
  "workdir": "{{WORKDIR}}",
  "ios_project": "{{IOS_PROJECT}}",
  "harmony_project": "{{PROJECT_NAME}}Harmony",
  "state_file": "output_{{PROJECT_NAME}}/workflow/迁移状态.md",
  "stages": [
    {
      "id": "ios-analyze",
      "name": "iOS工程分析",
      "profile": "ios-analyze",
      "required_inputs": ["{{IOS_PROJECT}}"],
      "expected_outputs": [
        "output_{{PROJECT_NAME}}/ios-analyze/specs/project.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/modules.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/functions.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/features.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/screens.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/capabilities.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/resources.json",
        "output_{{PROJECT_NAME}}/ios-analyze/reports/ios工程分析.md",
        "output_{{PROJECT_NAME}}/ios-analyze/reports/ios功能摘要.md",
        "output_{{PROJECT_NAME}}/ios-analyze/reports/ios界面摘要.md"
      ]
    },
    {
      "id": "platform-adaptation",
      "name": "平台能力适配",
      "profile": "platform-adaptation",
      "required_inputs": [
        "output_{{PROJECT_NAME}}/ios-analyze/specs/capabilities.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/features.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/modules.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/functions.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/screens.json",
        "skills/platform-adaptation/references/platform-capabilities.json"
      ],
      "expected_outputs": [
        "output_{{PROJECT_NAME}}/platform-adaptation/capability-coverage.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/feature-adaptation.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/implementation-guidance.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/interaction-adaptation.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/concurrency-adaptation.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/risks.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/reports/平台能力适配摘要.md"
      ]
    },
    {
      "id": "harmony-generate",
      "name": "Harmony工程生成",
      "profile": "harmony-generate",
      "required_inputs": [
        "output_{{PROJECT_NAME}}/ios-analyze/specs/project.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/modules.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/functions.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/features.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/screens.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/capability-coverage.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/feature-adaptation.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/implementation-guidance.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/interaction-adaptation.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/concurrency-adaptation.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/risks.json",
        "skills/harmony-generate/references/project-template"
      ],
      "expected_outputs": [
        "{{PROJECT_NAME}}Harmony",
        "output_{{PROJECT_NAME}}/harmony-generate/harmony模块实现计划.json",
        "output_{{PROJECT_NAME}}/harmony-generate/harmony全量实现追踪.md"
      ]
    },
    {
      "id": "harmony-verify",
      "name": "Harmony迁移验收",
      "profile": "harmony-verify",
      "required_inputs": [
        "{{PROJECT_NAME}}Harmony",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/features.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/screens.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/functions.json",
        "output_{{PROJECT_NAME}}/ios-analyze/specs/capabilities.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/interaction-adaptation.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/concurrency-adaptation.json",
        "output_{{PROJECT_NAME}}/platform-adaptation/implementation-guidance.json",
        "output_{{PROJECT_NAME}}/harmony-generate/harmony模块实现计划.json"
      ],
      "expected_outputs": [
        "output_{{PROJECT_NAME}}/harmony-verify/verify-report.json",
        "output_{{PROJECT_NAME}}/harmony-verify/gaps.json",
        "output_{{PROJECT_NAME}}/harmony-verify/reports/迁移验收摘要.md"
      ]
    }
  ]
}
